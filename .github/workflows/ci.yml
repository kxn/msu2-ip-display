name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  host-usb-test:
    name: Host USB test
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: host-usb
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test install script
        working-directory: ${{ github.workspace }}
        run: sh scripts/test-install-miniboard-ipd.sh

      - name: Install Rust targets
        run: |
          rustup target add \
            x86_64-unknown-linux-gnu \
            x86_64-unknown-linux-musl \
            aarch64-unknown-linux-musl \
            armv7-unknown-linux-musleabihf

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Test
        run: cargo test -- --nocapture

      - name: Build native release
        run: cargo build --release

      - name: Check Linux targets
        run: |
          cargo check --target x86_64-unknown-linux-gnu
          cargo check --target x86_64-unknown-linux-musl
          cargo check --target aarch64-unknown-linux-musl
          cargo check --target armv7-unknown-linux-musleabihf

  host-usb-artifacts:
    name: Host USB artifact (${{ matrix.name }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            target: x86_64-unknown-linux-musl
          - name: linux-arm64
            target: aarch64-unknown-linux-musl
          - name: linux-arm32
            target: armv7-unknown-linux-musleabihf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build host binary
        working-directory: host-usb
        run: cross build --release --target ${{ matrix.target }}

      - name: Package host binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "host-usb/target/${{ matrix.target }}/release/miniboard-ipd" "dist/miniboard-ipd"
          tar -C dist -czf "miniboard-ipd-${{ matrix.name }}.tar.gz" miniboard-ipd
          sha256sum "miniboard-ipd-${{ matrix.name }}.tar.gz" > "miniboard-ipd-${{ matrix.name }}.tar.gz.sha256"

      - name: Upload host artifact
        uses: actions/upload-artifact@v4
        with:
          name: miniboard-ipd-${{ matrix.name }}
          path: |
            miniboard-ipd-${{ matrix.name }}.tar.gz
            miniboard-ipd-${{ matrix.name }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

  flasher:
    name: Flasher (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            kind: portable
          - name: linux-x64
            runner: ubuntu-22.04
            kind: portable
          - name: macos-x64
            runner: macos-latest
            kind: dmg
            args: --target x86_64-apple-darwin --bundles dmg
          - name: macos-arm64
            runner: macos-latest
            kind: dmg
            args: --target aarch64-apple-darwin --bundles dmg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: flasher/package-lock.json

      - name: Install Rust macOS targets
        if: startsWith(matrix.name, 'macos-')
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Linux Tauri dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev libudev-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        working-directory: flasher
        run: npm ci

      - name: Build frontend
        if: matrix.kind == 'portable'
        working-directory: flasher
        run: npm run build

      - name: Test Rust backend
        working-directory: flasher/src-tauri
        run: cargo test

      - name: Build portable executable
        if: matrix.kind == 'portable'
        working-directory: flasher/src-tauri
        run: cargo build --release

      - name: Package Windows portable executable
        if: matrix.name == 'windows-x64'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path flasher-portable
          Copy-Item -LiteralPath flasher/src-tauri/target/release/msu2-flasher.exe -Destination flasher-portable/MSU2.Flasher-windows-x64.exe

      - name: Package Linux portable executable
        if: matrix.name == 'linux-x64'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p flasher-portable
          cp flasher/src-tauri/target/release/msu2-flasher flasher-portable/MSU2.Flasher-linux-x64
          chmod 0755 flasher-portable/MSU2.Flasher-linux-x64

      - name: Upload flasher portable artifact
        if: matrix.kind == 'portable'
        uses: actions/upload-artifact@v4
        with:
          name: msu2-flasher-${{ matrix.name }}-portable
          path: flasher-portable/*
          if-no-files-found: error
          retention-days: 14

      - name: Build macOS DMG
        if: matrix.kind == 'dmg'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: flasher
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: msu2-flasher-${{ matrix.name }}-[bundle]
