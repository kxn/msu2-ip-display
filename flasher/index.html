<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MSU2 刷写器</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1>MSU2 刷写器</h1>
        <span id="statusPill" class="pill warn">未检测到</span>
      </header>

      <section class="panel device-panel">
        <div class="panel-label">设备</div>
        <div class="device-row">
          <div class="usb-icon" aria-hidden="true"></div>
          <div class="device-copy">
            <div id="deviceName" class="device-name">未连接</div>
            <div id="devicePort" class="device-port"></div>
          </div>
          <button id="rescanButton" class="secondary" type="button">重新检测</button>
        </div>
      </section>

      <section class="panel write-panel">
        <div class="panel-label">写入</div>
        <div class="write-row">
          <div class="write-copy">
            <div id="writeTitle" class="write-title">未连接</div>
            <div id="writePercent" class="percent"></div>
          </div>
          <button id="flashButton" class="primary" type="button" disabled>写入</button>
        </div>
        <div class="progress-track">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </section>

      <section class="record-line">
        <span id="recordTime">--:--:--</span>
        <span id="recordText">未连接</span>
        <button id="copyLogButton" class="link-button hidden" type="button">复制记录</button>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
